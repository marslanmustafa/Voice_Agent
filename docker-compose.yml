version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      # Using the same Dockerfile, but we'll override the command
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn api:app --reload --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      # Prevents local node_modules from overwriting container's node_modules
      - /app/frontend/node_modules
    command: bash -c "cd frontend && pnpm dev -H 0.0.0.0"

  ngrok:
    image: ngrok/ngrok:latest
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: "http backend:8000"
    ports:
      - "4040:4040"
    depends_on:
      - backend
